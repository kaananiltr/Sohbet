<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#25D366"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Sohbet"/>
  <title>Sohbet</title>

  <!-- Firebase CDN (eski usul, module değil) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;height:100dvh;overflow:hidden}
    input,button{font-family:inherit}
    #home{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;padding:36px 28px;box-shadow:0 2px 20px rgba(0,0,0,.08);width:100%;max-width:360px}
    .logo{width:64px;height:64px;border-radius:50%;background:#25D366;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
    h1{text-align:center;font-size:22px;color:#111b21;margin-bottom:4px}
    .subtitle{text-align:center;font-size:13px;color:#667781;margin-bottom:28px}
    label{font-size:11px;font-weight:600;color:#667781;text-transform:uppercase;letter-spacing:.5px}
    .field{margin-bottom:14px}
    .field input{display:block;width:100%;margin-top:6px;padding:11px 14px;border-radius:10px;border:1.5px solid #e9edef;font-size:15px;outline:none;transition:border-color .2s}
    .field input:focus{border-color:#25D366}
    .room-row{display:flex;gap:8px;margin-top:6px}
    .room-row input{flex:1;padding:11px 14px;border-radius:10px;border:1.5px solid #e9edef;font-size:15px;outline:none;font-family:monospace;letter-spacing:2px}
    .room-row input:focus{border-color:#25D366}
    .btn-new{padding:11px 14px;border-radius:10px;border:1.5px solid #e9edef;background:#f8f9fa;cursor:pointer;font-size:13px;color:#25D366;font-weight:600;white-space:nowrap}
    .btn-join{width:100%;margin-top:20px;padding:13px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
    .btn-join:disabled{background:#ccc;cursor:default}
    .error{color:#e74c3c;font-size:13px;margin-top:8px}
    .hint{text-align:center;font-size:12px;color:#aaa;margin-top:14px}
    #chat{display:none;flex-direction:column;height:100dvh}
    .chat-header{background:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);flex-shrink:0;z-index:10}
    .avatar{width:42px;height:42px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .header-info{flex:1;min-width:0}
    .header-room{font-weight:700;font-size:16px;color:#111b21}
    .header-online{font-size:12px;color:#667781;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .btn-copy{background:#f0f2f5;border:none;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:12px;color:#667781;font-weight:600;flex-shrink:0}
    .btn-copy.copied{background:#e8f9f0;color:#25D366}
    .btn-leave{background:#fee;border:none;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:12px;color:#e74c3c;font-weight:600;flex-shrink:0}
    .messages{flex:1;overflow-y:auto;padding:12px 14px 8px;display:flex;flex-direction:column;gap:3px}
    .messages::-webkit-scrollbar{width:3px}
    .messages::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
    .sys-msg{text-align:center;margin:6px 0}
    .sys-msg span{background:rgba(255,255,255,.85);border-radius:20px;padding:3px 12px;font-size:12px;color:#667781}
    .msg-row{display:flex}
    .msg-row.mine{justify-content:flex-end}
    .msg-row.theirs{justify-content:flex-start}
    .msg-name{font-size:12px;font-weight:600;margin-bottom:2px;padding-left:4px}
    .bubble{max-width:72%;min-width:60px;padding:8px 11px 5px;box-shadow:0 1px 2px rgba(0,0,0,.08)}
    .mine .bubble{background:#dcf8c6;border-radius:16px 4px 16px 16px}
    .theirs .bubble{background:#fff;border-radius:4px 16px 16px 16px}
    .bubble-text{font-size:15px;color:#111b21;line-height:1.4;word-break:break-word;display:block}
    .bubble-time{font-size:11px;color:#8696a0;float:right;margin-left:8px;margin-top:2px}
    .empty-hint{text-align:center;color:#aaa;margin-top:60px;font-size:14px}
    .input-bar{background:#f0f2f5;padding:8px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;align-items:center;gap:10px;flex-shrink:0}
    .input-wrap{flex:1;background:#fff;border-radius:24px;display:flex;align-items:center;padding:8px 16px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
    .input-wrap input{flex:1;border:none;outline:none;font-size:15px;color:#111b21;background:transparent}
    .btn-send{width:46px;height:46px;border-radius:50%;background:#25D366;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
    .btn-send:disabled{background:#ccc;cursor:default}
    .dot{display:inline-block;font-size:20px;line-height:1;color:#25D366;animation:bounce 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
    #install-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:#25D366;color:white;padding:14px 16px;align-items:center;gap:12px;z-index:999;box-shadow:0 -2px 10px rgba(0,0,0,.15)}
    #install-banner p{flex:1;font-size:14px;font-weight:500}
    #install-banner .ibtn{background:white;color:#25D366;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:13px}
    #install-banner .iclose{background:transparent;color:white;border:none;font-size:20px;cursor:pointer;padding:4px 8px}
  </style>
</head>
<body>

<!-- ANA EKRAN -->
<div id="home">
  <div class="card">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <h1>Sohbet</h1>
    <p class="subtitle">Arkadaşlarınla bağlan</p>
    <div class="field">
      <label>Kullanıcı Adın</label>
      <input id="username-input" type="text" placeholder="Adını gir..." autocomplete="off"/>
    </div>
    <div class="field">
      <label>Oda Kodu</label>
      <div class="room-row">
        <input id="room-input" type="text" placeholder="ABCD12" maxlength="8" style="text-transform:uppercase"/>
        <button class="btn-new" onclick="createRoom()">Yeni Oda</button>
      </div>
    </div>
    <p class="error" id="error-msg"></p>
    <button class="btn-join" id="join-btn" onclick="joinRoom()">Odaya Katıl</button>
    <p class="hint">Arkadaşlarına oda kodunu paylaş 💬</p>
  </div>
</div>

<!-- SOHBET EKRANI -->
<div id="chat">
  <div class="chat-header">
    <div class="avatar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <div class="header-info">
      <div class="header-room">Oda: <span id="room-label" style="font-family:monospace;letter-spacing:1px"></span></div>
      <div class="header-online" id="online-label">Bağlanıyor...</div>
    </div>
    <button class="btn-copy" id="copy-btn" onclick="copyRoom()">📋 Paylaş</button>
    <button class="btn-leave" onclick="leaveRoom()">Çık</button>
  </div>
  <div class="messages" id="messages">
    <p class="empty-hint">Henüz mesaj yok. İlk mesajı sen at! 👋</p>
  </div>
  <div class="input-bar">
    <div class="input-wrap">
      <input id="msg-input" type="text" placeholder="Mesaj yaz..." autocomplete="off"
        oninput="handleTyping(this.value)"
        onkeydown="if(event.key==='Enter')sendMessage()"/>
    </div>
    <button class="btn-send" id="send-btn" onclick="sendMessage()" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- YÜKLE BANNER -->
<div id="install-banner">
  <p>📱 Ana ekrana ekle, uygulama gibi kullan!</p>
  <button class="ibtn" onclick="installApp()">Ekle</button>
  <button class="iclose" onclick="closeBanner()">✕</button>
</div>

<script>
  // ── Firebase Başlat ──────────────────────────────────
  firebase.initializeApp({
    apiKey: "AIzaSyAQ0AYvCEli2Htd89pCmxYYzK8B1m2e4vw",
    authDomain: "sohbetdeneme.firebaseapp.com",
    databaseURL: "https://sohbetdeneme-default-rtdb.firebaseio.com",
    projectId: "sohbetdeneme",
    storageBucket: "sohbetdeneme.firebasestorage.app",
    messagingSenderId: "280513382444",
    appId: "1:280513382444:web:cf90804f8749606c186989"
  });
  var db = firebase.database();

  // ── Yardımcı ────────────────────────────────────────
  var COLORS = ["#25D366","#0088cc","#e74c3c","#f39c12","#9b59b6","#1abc9c","#e67e22","#3498db"];
  function getColor(n){ return COLORS[n.split('').reduce(function(a,c){return a+c.charCodeAt(0)},0) % COLORS.length]; }
  function fmtTime(ts){ return new Date(ts).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}); }
  function randId(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
  function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── State ───────────────────────────────────────────
  var roomId, username, msgsRef, presRef, typingRef, typingTimer;
  var allMsgs = [];

  // ── Ana Ekran ───────────────────────────────────────
  function createRoom(){
    document.getElementById('room-input').value = randId();
  }

  function joinRoom(){
    var uname = document.getElementById('username-input').value.trim();
    var rid = document.getElementById('room-input').value.trim().toUpperCase();
    if(!uname || !rid){ document.getElementById('error-msg').textContent='Lütfen tüm alanları doldurun.'; return; }
    document.getElementById('error-msg').textContent='';
    document.getElementById('join-btn').disabled=true;
    document.getElementById('join-btn').textContent='Bağlanıyor...';

    username = uname;
    roomId = rid;

    msgsRef  = db.ref('rooms/'+rid+'/messages');
    presRef  = db.ref('rooms/'+rid+'/presence/'+uname);
    typingRef= db.ref('rooms/'+rid+'/typing/'+uname);

    // Presence
    presRef.set({online:true, ts: firebase.database.ServerValue.TIMESTAMP});
    presRef.onDisconnect().remove();

    // Katılma mesajı
    msgsRef.push({type:'system', text:uname+' odaya katıldı', ts:Date.now()});

    // Mesajları dinle
    msgsRef.on('value', function(snap){
      allMsgs=[];
      snap.forEach(function(c){ allMsgs.push(Object.assign({id:c.key},c.val())); });
      renderMessages();
    });

    // Presence dinle
    db.ref('rooms/'+rid+'/presence').on('value', function(snap){
      var users=[];
      snap.forEach(function(c){ users.push(c.key); });
      document.getElementById('online-label').textContent = users.join(', ')+' çevrimiçi';
    });

    // Yazıyor dinle
    db.ref('rooms/'+rid+'/typing').on('value', function(snap){
      var who=[];
      snap.forEach(function(c){ if(c.key!==username) who.push(c.key); });
      var el=document.getElementById('messages');
      var ex=el.querySelector('.typing-row');
      if(who.length>0){
        if(!ex){
          var d=document.createElement('div');
          d.className='typing-row';
          d.innerHTML='<div style="background:#fff;border-radius:4px 16px 16px 16px;padding:9px 13px;box-shadow:0 1px 2px rgba(0,0,0,.08);font-size:12px;color:#667781">'+who.join(', ')+' yazıyor <span class="dot">·</span><span class="dot">·</span><span class="dot">·</span></div>';
          el.appendChild(d);
          el.scrollTop=el.scrollHeight;
        }
      } else if(ex){ ex.remove(); }
    });

    document.getElementById('home').style.display='none';
    document.getElementById('chat').style.display='flex';
    document.getElementById('room-label').textContent=rid;
    document.getElementById('join-btn').disabled=false;
    document.getElementById('join-btn').textContent='Odaya Katıl';
  }

  function renderMessages(){
    var el=document.getElementById('messages');
    if(!allMsgs.length){ el.innerHTML='<p class="empty-hint">Henüz mesaj yok. İlk mesajı sen at! 👋</p>'; return; }
    var html=allMsgs.map(function(msg,i){
      if(msg.type==='system') return '<div class="sys-msg"><span>'+esc(msg.text)+'</span></div>';
      var mine=msg.from===username;
      var prev=allMsgs[i-1];
      var showName=!mine&&(i===0||prev.from!==msg.from||prev.type==='system');
      var color=getColor(msg.from||'');
      return '<div class="msg-row '+(mine?'mine':'theirs')+'" style="margin-top:'+(showName?8:2)+'px">'+
        '<div style="max-width:72%">'+
        (showName?'<div class="msg-name" style="color:'+color+'">'+esc(msg.from)+'</div>':'')+
        '<div class="bubble"><span class="bubble-text">'+esc(msg.text)+'</span><span class="bubble-time">'+fmtTime(msg.ts)+'</span></div>'+
        '</div></div>';
    }).join('');
    el.innerHTML=html;
    el.scrollTop=el.scrollHeight;
  }

  function sendMessage(){
    var inp=document.getElementById('msg-input');
    var text=inp.value.trim();
    if(!text||!msgsRef) return;
    msgsRef.push({type:'user', from:username, text:text, ts:Date.now()});
    inp.value='';
    document.getElementById('send-btn').disabled=true;
    typingRef.remove();
  }

  function handleTyping(val){
    document.getElementById('send-btn').disabled=!val.trim();
    if(!typingRef) return;
    clearTimeout(typingTimer);
    if(val.trim()){
      typingRef.set(true);
      typingTimer=setTimeout(function(){ typingRef.remove(); },3000);
    } else {
      typingRef.remove();
    }
  }

  function leaveRoom(){
    if(msgsRef) msgsRef.push({type:'system', text:username+' odadan ayrıldı', ts:Date.now()});
    if(presRef) presRef.remove();
    if(typingRef) typingRef.remove();
    if(msgsRef) msgsRef.off();
    db.ref('rooms/'+roomId+'/presence').off();
    db.ref('rooms/'+roomId+'/typing').off();
    document.getElementById('chat').style.display='none';
    document.getElementById('home').style.display='flex';
    allMsgs=[];
  }

  function copyRoom(){
    var text='Sohbet uygulamasına katıl!\nOda Kodu: '+roomId;
    if(navigator.share){
      navigator.share({title:'Sohbet', text:text});
    } else {
      navigator.clipboard.writeText(text).catch(function(){});
      var btn=document.getElementById('copy-btn');
      btn.textContent='✓ Kopyalandı'; btn.classList.add('copied');
      setTimeout(function(){ btn.textContent='📋 Paylaş'; btn.classList.remove('copied'); },2000);
    }
  }

  // ── PWA ─────────────────────────────────────────────
  var deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault(); deferredPrompt=e;
    document.getElementById('install-banner').style.display='flex';
  });
  function installApp(){ if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;} closeBanner(); }
  function closeBanner(){ document.getElementById('install-banner').style.display='none'; }

  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone;
  if(isIOS){
    var b=document.getElementById('install-banner');
    b.style.display='flex';
    b.querySelector('p').textContent='📱 Ana ekrana eklemek için: Paylaş → Ana Ekrana Ekle';
    b.querySelector('.ibtn').style.display='none';
  }
</script>
</body>
</html>
